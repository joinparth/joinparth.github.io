<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>parth.social — Maintenance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:          #090c14;
    --bg2:         #0e1220;
    --card:        #111623;
    --card2:       #161d2e;
    --border:      rgba(255,255,255,0.06);
    --border2:     rgba(255,255,255,0.10);
    --accent:      #f97316;
    --accent2:     #ea6b0a;
    --accent-dim:  rgba(249,115,22,0.12);
    --accent-glow: rgba(249,115,22,0.30);
    --text:        #f0f2f7;
    --text2:       #8b92a8;
    --text3:       #4a5168;
    --font-head:   'Syne', sans-serif;
    --font-body:   'DM Sans', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* Ambient background blobs */
  .bg-blob {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    filter: blur(80px);
    opacity: 0.55;
    animation: drift 12s ease-in-out infinite alternate;
  }
  .bg-blob-1 {
    width: 520px; height: 520px;
    background: radial-gradient(circle, rgba(249,115,22,0.18) 0%, transparent 70%);
    top: -160px; left: -120px;
    animation-duration: 14s;
  }
  .bg-blob-2 {
    width: 380px; height: 380px;
    background: radial-gradient(circle, rgba(59,130,246,0.10) 0%, transparent 70%);
    bottom: -80px; right: -80px;
    animation-duration: 18s;
    animation-direction: alternate-reverse;
  }
  .bg-blob-3 {
    width: 260px; height: 260px;
    background: radial-gradient(circle, rgba(249,115,22,0.08) 0%, transparent 70%);
    top: 50%; left: 55%;
    animation-duration: 10s;
  }

  @keyframes drift {
    from { transform: translate(0, 0) scale(1); }
    to   { transform: translate(30px, 20px) scale(1.06); }
  }

  /* Grid lines overlay */
  .grid-overlay {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }

  /* Main layout */
  .page {
    position: relative;
    z-index: 1;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
  }

  /* Card */
  .card {
    background: var(--card);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 52px 48px 44px;
    max-width: 520px;
    width: 100%;
    box-shadow: 0 0 60px rgba(249,115,22,0.08), 0 16px 48px rgba(0,0,0,0.5);
    animation: cardIn 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(32px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* Logo */
  .logo {
    font-family: var(--font-head);
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
    margin-bottom: 32px;
    animation: fadeDown 0.5s ease 0.1s both;
  }
  .logo span { color: var(--accent); }

  /* Icon */
  .icon-wrap {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: var(--accent-dim);
    border: 1px solid rgba(249,115,22,0.25);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    margin: 0 auto 24px;
    animation: spin-slow 6s linear infinite, fadeDown 0.5s ease 0.15s both;
    box-shadow: 0 0 28px var(--accent-glow);
  }

  @keyframes spin-slow {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  /* Heading */
  h1 {
    font-family: var(--font-head);
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.4px;
    margin-bottom: 12px;
    animation: fadeDown 0.5s ease 0.2s both;
  }
  h1 span { color: var(--accent); }

  /* Body text */
  .subtitle {
    font-size: 15px;
    color: var(--text2);
    line-height: 1.7;
    margin-bottom: 32px;
    animation: fadeDown 0.5s ease 0.28s both;
  }

  /* Divider */
  .divider {
    width: 48px;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), transparent);
    border-radius: 2px;
    margin: 0 auto 28px;
    animation: fadeDown 0.5s ease 0.32s both;
  }

  /* Contact pill */
  .contact-box {
    background: var(--card2);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 28px;
    animation: fadeDown 0.5s ease 0.38s both;
  }

  .contact-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 6px;
  }

  .contact-email {
    font-size: 14px;
    font-weight: 600;
    color: var(--accent);
    text-decoration: none;
    word-break: break-all;
    transition: color 0.15s ease;
  }
  .contact-email:hover { color: var(--accent2); text-decoration: underline; }

  /* Status bar */
  .status-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text3);
    animation: fadeDown 0.5s ease 0.44s both;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent-glow);
    animation: pulse 2s ease infinite;
    flex-shrink: 0;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1;  transform: scale(1); }
    50%       { opacity: 0.5; transform: scale(0.85); }
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Footer */
  .footer {
    margin-top: 28px;
    font-size: 12px;
    color: var(--text3);
    animation: fadeDown 0.5s ease 0.5s both;
  }

  @media (max-width: 480px) {
    .card { padding: 36px 24px 32px; }
    h1 { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="bg-blob bg-blob-1"></div>
<div class="bg-blob bg-blob-2"></div>
<div class="bg-blob bg-blob-3"></div>
<div class="grid-overlay"></div>

<div class="page">
  <div class="card">

    <div class="logo">parth<span>.</span>social</div>

    <div class="icon-wrap">⚙️</div>

    <h1>We'll be back <span>soon.</span></h1>

    <p class="subtitle">
      We're currently undergoing maintenance to improve our platform.<br>
      Thanks for your patience — we're working hard to make things better.
    </p>

    <div class="divider"></div>

    <div class="contact-box">
      <div class="contact-label">Questions? Reach out to</div>
      <a class="contact-email" href="mailto:rlippman@students.hackleyschool.org">
        rlippman@students.hackleyschool.org
      </a>
    </div>

    <div class="status-bar">
      <div class="status-dot"></div>
      Maintenance in progress
    </div>

  </div>

  <div class="footer">parth.social</div>
</div>

</body>
</html>
